apiVersion: apps/v1
kind: Deployment
metadata: { name: iocextract, labels: { app: iocextract } }
spec:
  replicas: 1
  selector: { matchLabels: { app: iocextract } }
  template:
    metadata: { labels: { app: iocextract } }
    spec:
      containers:
        - name: iocextract
          image: ghcr.io/cognis-digital/iocextract:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: iocextract }
spec:
  selector: { app: iocextract }
  ports: [{ port: 80, targetPort: 8000 }]
